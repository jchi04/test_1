<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeNet - 아동·청소년 보호 시스템</title>
    <style>
        :root {
            --main-bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --primary-blue: #2c3e50;
            --accent-indigo: #4834d4;
            --emergency-red: #d63031;
            --text-dark: #2d3436;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: var(--main-bg);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 120px;
        }

        header { padding: 50px 20px 30px; text-align: center; }
        header h1 { font-size: 2.5rem; margin: 0; font-weight: 800; color: var(--primary-blue); letter-spacing: -1px; }
        header .subtitle { font-size: 1.1rem; margin-top: 10px; color: #636e72; }

        .emergency-trigger {
            background: var(--emergency-red);
            color: white; border: none;
            width: 140px; height: 140px;
            border-radius: 50%;
            font-size: 1.25rem; font-weight: 800;
            cursor: pointer; margin: 25px auto;
            display: block;
            box-shadow: 0 10px 30px rgba(214, 48, 49, 0.3);
            animation: warning-pulse 2s infinite;
        }

        @keyframes warning-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 48, 49, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(214, 48, 49, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 48, 49, 0); }
        }

        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; padding: 0 20px; }
        .tab-btn {
            background: var(--glass-bg); border: 1px solid rgba(0,0,0,0.1);
            padding: 12px 24px; border-radius: 8px;
            font-weight: 700; color: #636e72; cursor: pointer; transition: 0.2s;
        }
        .tab-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }

        .container { max-width: 550px; margin: 0 auto; padding: 0 20px; }
        .card {
            background: var(--glass-bg); border: 1px solid rgba(0,0,0,0.05);
            padding: 30px; border-radius: 12px; margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h3 { 
            margin-top: 0; font-size: 1.3rem; color: var(--primary-blue);
            border-left: 5px solid var(--accent-indigo); padding-left: 15px;
            margin-bottom: 20px;
        }

        label { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; display: block; color: var(--primary-blue); }
        input, select, textarea {
            background: #ffffff; border: 1px solid #dfe6e9;
            border-radius: 6px; padding: 14px; width: 100%;
            box-sizing: border-box; margin-bottom: 20px; font-size: 1rem;
        }

        #real-name-container { display: none; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .location-info {
            background: #f1f2f6; padding: 15px; border-radius: 8px;
            margin-bottom: 20px; font-size: 0.9rem; color: #2d3436;
            display: none; border: 1px solid #dfe6e9; line-height: 1.6;
        }

        /* 추가된 지도 컨테이너 스타일 */
        #map-container {
            margin-top: 20px;
            width: 100%;
            height: 250px;
            border-radius: 8px;
            overflow: hidden;
            display: none;
            border: 1px solid #dfe6e9;
        }

        .btn-submit {
            background: var(--accent-indigo); color: white; border: none;
            padding: 18px; border-radius: 8px; width: 100%;
            font-size: 1.1rem; font-weight: 800; cursor: pointer;
        }

        .escape-btn {
            position: fixed; right: 20px; bottom: 100px;
            background: rgba(45, 52, 54, 0.7);
            color: white; border: none;
            padding: 10px 18px; border-radius: 20px;
            font-weight: 600; z-index: 1000; cursor: pointer;
            font-size: 0.8rem; backdrop-filter: blur(4px);
        }

        footer {
            position: fixed; bottom: 0; width: 100%; background: #ffffff;
            padding: 20px 0; text-align: center; border-top: 1px solid #dfe6e9; z-index: 999;
        }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 35px; border-radius: 12px; text-align: center; max-width: 350px; }
    </style>
</head>
<body>

    <button class="escape-btn" onclick="quickEscape()">홈으로 이동</button>

    <header>
        <h1>SafeNet</h1>
        <p class="subtitle">아동·청소년 보호 전문 신고 시스템</p>
        <button class="emergency-trigger" onclick="getLocationAndReport()">긴급 신고</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('report')">신고 접수</button>
        <button class="tab-btn" onclick="switchTab('auto')">보안 안내</button>
    </div>

    <div class="container">
        <section id="report-section" class="content-section">
            <div class="card">
                <h3>정식 신고서</h3>
                
                <div id="location-display" class="location-info"></div>

                <label>신고 방식 선택</label>
                <select id="report-mode" onchange="toggleNameField()">
                    <option value="anon">익명 신고 (신원 보호)</option>
                    <option value="real">실명 신고 (본인 확인)</option>
                </select>

                <div id="real-name-container">
                    <label>신고인 성함</label>
                    <input type="text" id="user-name" placeholder="성함을 입력해 주세요">
                </div>

                <label>피해 유형</label>
                <select>
                    <option>유형을 선택하세요</option>
                    <option>학교폭력 / 집단 따돌림</option>
                    <option>가정폭력 / 학대</option>
                    <option>기타 긴급 상황</option>
                </select>

                <label>발생 장소 및 상세 주소</label>
                <input type="text" id="detail-address" placeholder="건물명, 동·호수 등을 적어주세요.">

                <label>피해 내용 기술</label>
                <textarea rows="5" placeholder="사건 경위를 상세히 작성해 주시기 바랍니다."></textarea>

                <button class="btn-submit" onclick="submitReport()">공식 신고 접수</button>
            </div>
        </section>

        <!-- 보안 안내 섹션 (수정 없이 기능만 추가됨) -->
        <section id="auto-section" class="content-section" style="display:none;">
            <div class="card">
                <h3>시스템 보안 안내</h3>
                <p style="color: #636e72; font-size: 0.95rem; line-height: 1.6;">
                    SafeNet은 사용자의 안전을 위해 다음과 같은 보안 기술을 적용하고 있습니다.<br><br>
                    <strong>1. 실시간 GPS 위치 추적</strong><br>
                    긴급 신고 버튼을 누르는 즉시 사용자의 현재 좌표가 수집되어 구조를 돕습니다.<br><br>
                    <strong>2. 데이터 암호화 전송</strong><br>
                    모든 신고 내용은 관련 법령에 따라 철저히 비공개로 취급됩니다.
                </p>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
                
                <!-- 추가된 위치 확인 인터페이스 -->
                <button class="btn-submit" style="background: #2d3436;" onclick="showCurrentMap()">내 현재 위치 지도 확인</button>
                <div id="map-container"></div>
            </div>
        </section>
    </div>

    <footer>
        <span style="color: #636e72; font-size: 0.9rem;">24시간 긴급 상담 : </span>
        <a href="tel:1577-1391" style="color: var(--emergency-red); font-weight: 800; text-decoration: none;">📞 1577-1391</a>
    </footer>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="color: var(--primary-blue); margin-bottom: 15px;">접수 완료</h2>
            <p id="modal-body" style="color: #636e72; line-height: 1.6; margin-bottom: 25px;"></p>
            <button class="btn-submit" onclick="closeModal()">확인</button>
        </div>
    </div>

    <script>
        function toggleNameField() {
            const mode = document.getElementById('report-mode').value;
            const container = document.getElementById('real-name-container');
            container.style.display = (mode === 'real') ? 'block' : 'none';
        }

        // 보안 안내 창 전용 지도 표시 함수
        function showCurrentMap() {
            const mapContainer = document.getElementById('map-container');
            if (navigator.geolocation) {
                mapContainer.style.display = 'block';
                mapContainer.innerHTML = "<p style='text-align:center; padding-top:100px; color:#666;'>지도를 불러오고 있습니다...</p>";
                
                navigator.geolocation.getCurrentPosition(function(pos) {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    // 구글 지도 임베드 (무료 방식)
                    mapContainer.innerHTML = `<iframe width="100%" height="100%" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" src="https://maps.google.com/maps?q=${lat},${lon}&hl=ko&z=15&amp;output=embed"></iframe>`;
                }, function() {
                    mapContainer.innerHTML = "<p style='padding:20px; color:red;'>위치 정보를 가져올 수 없습니다. 권한 설정을 확인해주세요.</p>";
                });
            }
        }

        function getLocationAndReport() {
            const display = document.getElementById('location-display');
            if (navigator.geolocation) {
                display.style.display = 'block';
                display.innerHTML = "📍 위치 파악 중...";
                navigator.geolocation.getCurrentPosition(function(pos) {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    display.innerHTML = `<strong>위치 수집 성공</strong><br>좌표: ${lat.toFixed(4)}, ${lon.toFixed(4)}<br><a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank" style="color: #4834d4;">[지도에서 보기]</a>`;
                    showModal("🚨 긴급 알람 발송", `현 위치 좌표(${lat.toFixed(4)}, ${lon.toFixed(4)})가 수사 기관으로 즉시 전송되었습니다. 안전한 곳으로 대피하십시오.`);
                }, function() {
                    display.innerHTML = "❌ 위치 정보를 가져올 수 없습니다. 권한 설정을 확인해 주세요.";
                });
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-section').style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        function submitReport() {
            showModal("접수 완료", "신고서가 성공적으로 전송되었습니다. 담당 전문 요원이 신속하게 확인하겠습니다.");
        }

        function showModal(title, body) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-body').innerHTML = body;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        function quickEscape() { window.location.href = "https://www.naver.com"; }
    </script>
</body>
</html>
