<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeNet - 아동·청소년 보호 시스템</title>
    <style>
        :root {
            --main-bg: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --primary-blue: #2c3e50;
            --accent-indigo: #4834d4;
            --emergency-red: #d63031;
            --text-dark: #2d3436;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background: var(--main-bg);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        header {
            padding: 60px 20px 40px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5rem;
            margin: 0;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: -1px;
        }

        header .subtitle {
            font-size: 1.1rem;
            margin-top: 10px;
            color: #636e72;
            font-weight: 400;
        }

        .emergency-trigger {
            background: var(--emergency-red);
            color: white;
            border: none;
            width: 140px; height: 140px;
            border-radius: 50%;
            font-size: 1.25rem;
            font-weight: 800;
            cursor: pointer;
            margin: 30px auto;
            display: block;
            box-shadow: 0 10px 30px rgba(214, 48, 49, 0.3);
            animation: warning-pulse 2s infinite;
        }

        @keyframes warning-pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 48, 49, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(214, 48, 49, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(214, 48, 49, 0); }
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            padding: 0 20px;
        }

        .tab-btn {
            background: var(--glass-bg);
            border: 1px solid rgba(0,0,0,0.1);
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 700;
            color: #636e72;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--primary-blue);
            color: white;
            border-color: var(--primary-blue);
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .card {
            background: var(--glass-bg);
            border: 1px solid rgba(0,0,0,0.05);
            padding: 35px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        h3 { 
            margin-top: 0; 
            font-size: 1.4rem; 
            color: var(--primary-blue);
            border-left: 5px solid var(--accent-indigo);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        label { 
            font-size: 0.95rem; 
            font-weight: 700;
            color: var(--primary-blue);
            margin-bottom: 10px; 
            display: block; 
        }

        input, select, textarea {
            background: #ffffff;
            border: 1px solid #dfe6e9;
            border-radius: 6px;
            padding: 14px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 25px;
            font-size: 1rem;
            color: var(--text-dark);
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-indigo);
            box-shadow: 0 0 0 3px rgba(72, 52, 212, 0.1);
        }

        /* 실명 입력 필드 애니메이션 */
        #real-name-container {
            display: none;
            overflow: hidden;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-submit {
            background: var(--accent-indigo);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 8px;
            width: 100%;
            font-size: 1.15rem;
            font-weight: 800;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-submit:hover {
            background: #341f97;
        }

        .escape-btn {
            position: fixed;
            right: 25px; bottom: 100px;
            background: #2d3436;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            z-index: 1000;
        }

        footer {
            position: fixed;
            bottom: 0; width: 100%;
            background: #ffffff;
            padding: 20px 0;
            text-align: center;
            border-top: 1px solid #dfe6e9;
            z-index: 900;
        }

        .comfort-msg {
            background: #f1f2f6;
            color: #57606f;
            padding: 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 25px;
            line-height: 1.6;
            text-align: center;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 2000;
            justify-content: center; align-items: center;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            max-width: 350px;
        }
    </style>
</head>
<body>

    <button class="escape-btn" onclick="quickEscape()">화면 즉시 숨기기 (Naver 이동)</button>

    <header>
        <h1>SafeNet</h1>
        <p class="subtitle">아동·청소년 보호를 위한 전문 신고 시스템</p>
        <button class="emergency-trigger" onclick="showEmergencyModal()">긴급 신고</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('report')">신고서 작성</button>
        <button class="tab-btn" onclick="switchTab('auto')">자동 보안 설정</button>
    </div>

    <div class="container">
        <!-- 신고 섹션 -->
        <section id="report-section" class="content-section">
            <div class="card">
                <h3>정식 신고 접수</h3>
                
                <label for="report-mode">신고인 본인 확인</label>
                <select id="report-mode" onchange="toggleNameField()">
                    <option value="anon">익명 신고 (신원 비공개)</option>
                    <option value="real">실명 신고 (본인 확인)</option>
                </select>

                <!-- 실명 선택 시 나타나는 필드 -->
                <div id="real-name-container">
                    <label for="user-name">신고인 성함</label>
                    <input type="text" id="user-name" placeholder="성함을 입력해 주세요">
                </div>

                <label>피해 유형 선택</label>
                <select>
                    <option>유형을 선택하세요</option>
                    <option>학교폭력 / 집단 따돌림</option>
                    <option>가정폭력 / 학대</option>
                    <option>디지털 성범죄 / 사이버 폭력</option>
                    <option>기타 긴급 구조 요청</option>
                </select>

                <label>사건 발생 경위 및 상세 내용</label>
                <textarea rows="6" placeholder="사건의 일시, 장소, 피해 내용을 구체적으로 작성해 주시기 바랍니다."></textarea>

                <button class="btn-submit" onclick="submitReport()">공식 신고 접수</button>
                
                <div class="comfort-msg">
                    현재 입력하신 정보는 관련법에 따라 엄격히 보호되며,<br>
                    <strong>전문 상담사와 수사관</strong>에게 즉시 전달될 예정입니다.
                </div>
            </div>
        </section>

        <!-- 보안 설정 섹션 -->
        <section id="auto-section" class="content-section" style="display:none;">
            <div class="card">
                <h3>시스템 보안 설정</h3>
                <p style="font-size: 0.95rem; margin-bottom: 25px; color: #636e72;">위험 상황 자동 감지 및 긴급 알림 기능을 설정합니다.</p>
                
                <div style="padding: 15px; background: #f8f9fa; border-radius: 8px; margin-bottom: 20px;">
                    <label style="margin-bottom: 5px;">음성 감지 긴급 알림</label>
                    <p style="font-size: 0.85rem; color: #888; margin-top: 0;">특정 키워드(도와줘, 살려줘) 감지 시 자동 신고</p>
                </div>
                
                <button class="btn-submit" style="background: #2d3436;" onclick="alert('시스템 보안 설정이 업데이트되었습니다.')">설정 변경 사항 저장</button>
            </div>
        </section>
    </div>

    <footer>
        <span style="color: #636e72;">24시간 긴급 상담 센터 : </span>
        <a href="tel:1577-1391" style="text-decoration: none; color: var(--emergency-red); font-weight: 800;">
            📞 1577-1391
        </a>
    </footer>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="color: var(--primary-blue); margin-bottom: 15px;">접수 완료</h2>
            <p id="modal-body" style="color: #636e72; line-height: 1.6; margin-bottom: 25px;">신고서가 성공적으로 전송되었습니다.<br>담당 전문 요원이 신속하게 확인 후 조치하겠습니다.</p>
            <button class="btn-submit" onclick="closeModal()">확인</button>
        </div>
    </div>

    <script>
        // 실명 신고 선택 시 이름 입력 필드 토글
        function toggleNameField() {
            const reportMode = document.getElementById('report-mode').value;
            const nameContainer = document.getElementById('real-name-container');
            
            if (reportMode === 'real') {
                nameContainer.style.display = 'block';
            } else {
                nameContainer.style.display = 'none';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-section').style.display = 'block';
            event.currentTarget.classList.add('active');
        }

        function submitReport() {
            document.getElementById('modal').style.display = 'flex';
        }

        function showEmergencyModal() {
            document.getElementById('modal-title').innerText = "🚨 긴급 알람 전송";
            document.getElementById('modal-body').innerText = "최우선 순위 긴급 구조 신호가 발송되었습니다. GPS 기반 위치 추적이 시작되니 안전한 장소로 대피하십시오.";
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        function quickEscape() {
            window.location.href = "https://www.naver.com";
        }
    </script>
</body>
</html>
